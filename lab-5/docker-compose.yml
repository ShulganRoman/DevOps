services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-hobbie_db}
      MYSQL_USER: ${MYSQL_USER:-test}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?set MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD}
    volumes:
      - dbdata:/var/lib/mysql
    expose:
      - "3306"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -u$$MYSQL_USER -p$$MYSQL_PASSWORD --silent",
        ]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: spring-backend/Dockerfile
    environment:
      DB_HOST: db
      MYSQL_DATABASE: ${MYSQL_DATABASE:-hobbie_db}
      MYSQL_USER: ${MYSQL_USER:-test}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?set MYSQL_PASSWORD}
      MYSQL_PORT: ${MYSQL_PORT:-3306}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    expose:
      - "8080"

  frontend:
    build:
      context: .
      dockerfile: react-frontend/Dockerfile
    depends_on:
      - backend
    restart: unless-stopped
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ >/dev/null 2>&1"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 10s

  nginx:
    image: nginx:alpine
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - /Users/romanshulgan/devops/lab-5/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      frontend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  dbdata:
