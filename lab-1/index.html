<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>Welcome to Nginx</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <style>
      :root {
        --bg: #0f172a;
        --card: #111827;
        --text: #e5e7eb;
        --muted: #9ca3af;
        --accent: #38bdf8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(circle at top, #1e293b, var(--bg));
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        color: var(--text);
      }

      .card {
        background: var(--card);
        padding: 2.5rem 3rem;
        border-radius: 14px;
        max-width: 420px;
        width: 100%;
        box-shadow:
          0 20px 40px rgba(0, 0, 0, 0.4),
          inset 0 1px 0 rgba(255, 255, 255, 0.05);
      }

      h1 {
        margin: 0 0 0.5rem;
        font-size: 1.8rem;
        letter-spacing: 0.3px;
      }

      h1 span {
        color: var(--accent);
      }

      p {
        margin: 0.5rem 0 1.5rem;
        color: var(--muted);
        line-height: 1.6;
      }

      .info {
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 0.5rem 1rem;
        font-size: 0.95rem;
      }

      .label {
        color: var(--muted);
      }

      .value {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, monospace;
      }

      footer {
        margin-top: 2rem;
        font-size: 0.85rem;
        color: var(--muted);
        text-align: center;
      }
    </style>
  </head>

  <body>
    <div class="card">
      <h1>Welcome to <span>Nginx</span></h1>

      <p>
        Если ты видишь эту страницу — значит сервер успешно запущен и корректно
        отдаёт статический контент.
      </p>

      <div class="info">
        <div class="label">Server</div>
        <div class="value">nginx</div>

        <div class="label">Container</div>
        <div class="value">Docker</div>

        <div class="label">Status</div>
        <div class="value">OK</div>
      </div>

      <footer>🚀 Ready for reverse proxy, SSL и production</footer>
    </div>
  </body>
</html>
