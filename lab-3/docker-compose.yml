services:
  app:
    build: .
    container_name: lab-3
    environment:
      APP_NAME: "Notes Service"
      APP_HOST: 0.0.0.0
      APP_PORT: "8080"
      APP_USERS: "demo:demo"
      APP_SESSION_COOKIE: "notes_session"
      APP_READ_TIMEOUT: 5s
      APP_WRITE_TIMEOUT: 10s
      APP_SHUTDOWN_TIMEOUT: 10s
    ports:
      - "8080:8080"
    restart: unless-stopped
